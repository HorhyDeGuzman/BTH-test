services:
  postgres:
    image: postgres:17-alpine
    container_name: bth_test_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-bth_test}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-laravel} -d ${DB_DATABASE:-bth_test}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: bth_test_postgres_data
